name: Android CI and Quality Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build and Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # - name: Set up JDK 17
      #   uses: actions/setup-java@v4
      #   with:
      #     java-version: '17'
      #     distribution: 'temurin'
      #     cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Step 1: Run Unit Tests and Generate Coverage (Required for D2)
      - name: Run Tests and Generate Coverage Report
        run: ./gradlew testDebugUnitTestCoverage # Ensure your project has a coverage plugin like Jacoco

      # Step 2: SonarQube Analysis (Required for D1 & D2)
      - name: SonarQube Scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew sonar --info
